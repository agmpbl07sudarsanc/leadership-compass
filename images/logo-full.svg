<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 140" role="img" aria-label="The Leadership Compass — Navigate, Inspire, Lead">
  <!-- Full lockup recolored to site theme: zinc #18181B / #3F3F46, amber #D97706 -->

  <!-- Compass mark -->
  <g transform="translate(10,10) scale(1.2)">
    <circle cx="50" cy="50" r="46" fill="none" stroke="#18181B" stroke-width="5"/>
    <circle cx="50" cy="50" r="38" fill="none" stroke="#D97706" stroke-width="1.8"/>
    <g stroke="#18181B" stroke-width="2">
      <line x1="50" y1="9" x2="50" y2="16"/>
      <line x1="50" y1="84" x2="50" y2="91"/>
      <line x1="9" y1="50" x2="16" y2="50"/>
      <line x1="84" y1="50" x2="91" y2="50"/>
    </g>
    <g fill="#3F3F46">
      <polygon points="50,50 28,28 44,44"/>
      <polygon points="50,50 72,28 56,44"/>
      <polygon points="50,50 72,72 56,56"/>
      <polygon points="50,50 28,72 44,56"/>
    </g>
    <polygon points="50,50 16,50 46,44" fill="#18181B"/>
    <polygon points="50,50 16,50 46,56" fill="#3F3F46"/>
    <polygon points="50,50 84,50 54,44" fill="#3F3F46"/>
    <polygon points="50,50 84,50 54,56" fill="#18181B"/>
    <polygon points="50,50 50,88 44,54" fill="#18181B"/>
    <polygon points="50,50 50,88 56,54" fill="#3F3F46"/>
    <polygon points="50,50 50,10 44,54" fill="#D97706"/>
    <polygon points="50,50 50,10 56,54" fill="#F59E0B"/>
    <circle cx="50" cy="50" r="5" fill="#18181B"/>
    <circle cx="50" cy="50" r="2.2" fill="#D97706"/>
  </g>

  <!-- Divider line -->
  <line x1="155" y1="30" x2="155" y2="110" stroke="#E4E4E7" stroke-width="2"/>

  <!-- Wordmark -->
  <text x="175" y="48" font-family="Poppins, 'Open Sans', sans-serif" font-size="15" font-weight="600" letter-spacing="6" fill="#D97706">THE</text>
  <text x="173" y="88" font-family="Poppins, 'Open Sans', sans-serif" font-size="36" font-weight="700" fill="#18181B">Leadership Compass</text>
  <line x1="175" y1="100" x2="545" y2="100" stroke="#E4E4E7" stroke-width="1.5"/>
  <text x="175" y="122" font-family="Poppins, 'Open Sans', sans-serif" font-size="13" font-weight="600" letter-spacing="4.5" fill="#D97706">NAVIGATE &#183; INSPIRE &#183; LEAD</text>
</svg>
